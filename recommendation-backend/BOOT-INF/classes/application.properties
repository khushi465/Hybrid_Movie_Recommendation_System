spring.datasource.url=jdbc:postgresql://postgresql:5432/recommendation_db
spring.datasource.hikari.data-source-properties.stringtype=unspecified
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true

spring.cache.type=redis
spring.data.redis.host=redis
spring.data.redis.port=6379
#ttl=5minutes (good balance)
spring.cache.redis.time-to-live=300000

ml.service.url=http://ml-service:8000/recommend

spring.kafka.bootstrap-servers=kafka:9092

spring.kafka.consumer.group-id=recommendation-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
resilience4j.circuitbreaker.instances.mlService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.mlService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.mlService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.mlService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.mlService.permittedNumberOfCallsInHalfOpenState=3

resilience4j.timelimiter.instances.mlService.timeoutDuration=2s